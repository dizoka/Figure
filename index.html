<!doctype html><html lang="uk"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ЛНТУ калькулятор конкурсного бала</title><style>
:root{--bg:#0d141b;--card:#1d242d;--card2:#eaf8fd;--teal:#138c9a;--teal2:#0f7582;--line:#2b6170;--txt:#edf8fb;--muted:#9fb0bb;--green:#0a9664;--red:#c64747;--amber:#d28a16}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:16px}.top{position:sticky;top:0;z-index:5;background:linear-gradient(135deg,#0f95a1,#137684);padding:22px max(18px,calc((100vw - 1180px)/2));box-shadow:0 6px 24px #0006}.top h1{margin:0;font-size:clamp(28px,5vw,48px);line-height:1.12}.wrap{max-width:1180px;margin:auto;padding:22px}.panel{background:var(--card);border:1px solid #274758;border-radius:28px;padding:24px;margin-bottom:24px;box-shadow:0 18px 35px #0003}h2{font-size:clamp(28px,5vw,48px);margin:0 0 18px}.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:22px}.field{margin-bottom:14px}.field label{display:block;font-size:18px;font-weight:800;margin-bottom:7px}.row{display:grid;grid-template-columns:1fr 160px;gap:12px;align-items:center}.input,select{width:100%;padding:16px 18px;border-radius:16px;border:2px solid #355461;background:#151c23;color:var(--txt);font-size:22px;outline:none}.input:focus,select:focus{border-color:#4fc5d5}.btn{border:0;border-radius:20px;background:var(--teal);color:white;padding:18px 22px;font-size:24px;font-weight:900;cursor:pointer}.btn.secondary{background:#263747;color:#b9ecf4}.btn.small{font-size:16px;padding:10px 14px;border-radius:14px}.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:15px}.selectBox{position:relative}.selectBtn{width:100%;display:flex;align-items:center;gap:14px;background:#151c23;border:2px solid #355461;color:var(--txt);border-radius:18px;padding:16px 18px;font-size:24px;font-weight:900;cursor:pointer}.code{display:inline-flex;align-items:center;justify-content:center;background:#101a8f;color:white;border:2px solid white;border-radius:10px;padding:2px 9px;font-weight:950;min-width:54px}.drop{display:none;position:absolute;top:calc(100% + 10px);left:0;right:0;z-index:10;background:#1f2731;border:2px solid #234d5a;border-radius:22px;overflow:hidden;box-shadow:0 20px 50px #000a}.drop.show{display:block}.drop input{margin:16px;width:calc(100% - 32px)}.opts{max-height:420px;overflow:auto}.opt{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:start;padding:15px 18px;border-top:1px solid #111a22;cursor:pointer}.opt:hover,.opt.active{background:#2a3541}.small{color:var(--muted);font-size:14px;line-height:1.35}.status{border:2px dashed #285563;border-radius:20px;padding:18px;color:#abdbe4;font-size:18px}.tabs{display:flex;gap:12px;flex-wrap:wrap}.tab{border:2px solid #365565;background:#18222a;color:#cfeef4;border-radius:999px;padding:13px 20px;font-weight:900;font-size:20px;cursor:pointer}.tab.active{background:var(--teal);color:white}.cards{display:grid;gap:14px;margin-top:18px}.card{display:grid;grid-template-columns:auto 1fr auto;gap:16px;background:#121b23;border:1px solid #2b5965;border-radius:22px;padding:18px}.title{font-size:24px;font-weight:950}.meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px}.pill{border:1px solid #426270;border-radius:999px;padding:6px 10px;color:#bde8ef;font-size:13px;font-weight:800}.pill.green{background:#043d31;color:#7ef0bd}.pill.warn{background:#47320a;color:#ffd986}.pill.red{background:#4b1518;color:#ffb3b3}.right{text-align:right;min-width:150px}.big{font-size:28px;font-weight:950}.ok{color:#10b981}.no{color:#ff6b6b}.edge{color:#e9a323}.detail{background:var(--card2);color:#15212a;border:2px solid #b8dfe8;border-radius:28px;overflow:hidden;margin-top:18px}.detailHead{padding:24px 26px;color:#0c7583}.detailHead h3{font-size:clamp(28px,5vw,46px);margin:0 0 8px}.score{font-size:clamp(34px,8vw,64px);font-weight:950;line-height:1.12;color:#0a7583}.budget{font-size:24px;font-weight:950;color:var(--green);margin-top:12px}.warnTxt{font-size:22px;font-weight:950;color:var(--amber);margin-top:12px}.formula{width:100%;border-collapse:collapse;background:white}.formula td{border:1px solid #cfe3e9;padding:13px 16px;font-size:18px}.formula td:nth-child(2),.formula td:nth-child(3){text-align:center;font-weight:800}.hint{background:#e5f7fc;border-top:1px solid #c2dfe8;padding:18px 24px;color:#165b68;font-size:18px}.tableWrap{overflow:auto;border-radius:18px;border:1px solid #294f5b;margin-top:18px}table.results{width:100%;border-collapse:collapse;background:#141e26}table.results th,table.results td{border-bottom:1px solid #293c46;padding:12px;text-align:left;vertical-align:top}table.results th{position:sticky;top:0;background:#1f313b}.empty{border:2px dashed #345b66;border-radius:20px;padding:28px;color:#b9d9df;font-size:22px}.hide{display:none!important}@media(max-width:760px){.wrap{padding:14px}.panel{padding:18px;border-radius:22px}.grid{grid-template-columns:1fr}.row{grid-template-columns:1fr 120px}.input,select{font-size:19px;padding:14px}.btn{width:100%;font-size:20px}.card{grid-template-columns:1fr}.right{text-align:left}.top{padding:20px}.formula td{font-size:16px;padding:10px}.score{font-size:42px}.selectBtn{font-size:18px}.opts{max-height:360px}.title{font-size:21px}}
</style></head><body><header class="top"><h1>ЛНТУ · калькулятор конкурсного бала</h1></header><main class="wrap"><section class="panel"><div class="grid"><div><h2>1. Обери пропозицію</h2><div class="selectBox" id="sel"><button class="selectBtn" id="selectBtn"><span class="code">Усі</span><span>Показати всі пропозиції</span></button><div class="drop" id="drop"><input class="input" id="specSearch" placeholder="Пошук: F3, J8, логістика, денна, ID"><div class="opts" id="opts"></div></div></div><p class="small">Тепер не змішую спеціальність і пропозиції: кожна освітня програма / форма / ID — окремий рядок.</p><h2 style="margin-top:18px">2. Введи бали НМТ</h2><div class="field"><div class="row"><label>Українська мова</label><input id="ua" class="input" type="number" min="0" max="200" value="0"></div></div><div class="field"><div class="row"><label>Історія України</label><input id="history" class="input" type="number" min="0" max="200" value="0"></div></div><div class="field"><div class="row"><label>Математика</label><input id="math" class="input" type="number" min="0" max="200" value="0"></div></div><div class="field"><label>4-й предмет</label><div class="row"><select id="fourth"><option value="foreign">Іноземна мова</option><option value="physics">Фізика</option><option value="chemistry">Хімія</option><option value="biology">Біологія</option><option value="geography">Географія</option><option value="literature">Українська література</option></select><input id="fourthScore" class="input" type="number" min="0" max="200" value="0"></div></div><div class="field"><label>Підготовчі курси / ОУ</label><select id="prep"><option value="0">Немає / не враховувати</option><option value="15">+15</option></select></div><button class="btn" id="calc">Розрахувати конкурсний бал</button><div class="actions"><button class="btn secondary" id="reset">Скинути</button><button class="btn secondary" id="refresh">Оновити дані</button></div></div><div><h2>Статус даних</h2><div class="status" id="status">Завантаження…</div><div class="actions"><button class="btn small secondary" id="copy">Скопіювати посилання</button></div><div id="detail"></div></div></div></section><section class="panel"><div class="tabs"><button class="tab active" data-filter="all">Усі</button><button class="tab" data-filter="ok">Проходиш</button><button class="tab" data-filter="no">Не вистачає</button><button class="tab" data-filter="unknown">Без порогу</button></div><input id="search" class="input" placeholder="Пошук у результатах" style="margin-top:16px"><div id="cards" class="cards"></div><div class="tableWrap"><table class="results"><thead><tr><th>Код</th><th>Спеціальність</th><th>Пропозиція</th><th>3–10</th><th>1–2</th><th>Бюджет</th></tr></thead><tbody id="tbody"></tbody></table></div></section></main><script>
let DATA={offers:[]}, selected='all', filter='all';const $=id=>document.getElementById(id);const LAB={ua:'Українська мова',history:'Історія України',math:'Математика',foreign:'Іноземна мова',physics:'Фізика',chemistry:'Хімія',biology:'Біологія',geography:'Географія',literature:'Українська література'};const fmt=(n,d=3)=>Number.isFinite(n)?Number(n).toFixed(d):'—';function vals(){return{ua:+$('ua').value||0,history:+$('history').value||0,math:+$('math').value||0,fourth:$('fourth').value,fourthScore:+$('fourthScore').value||0,prep:+$('prep').value||0}}function calc(o){const v=vals(),c=o.coeffs||{};const k4=c[v.fourth]??0;const k4max=c.k4max??k4;const den=(c.ua||0)+(c.history||0)+(c.math||0)+(k4+k4max)/2;if(!den)return{base:NaN,p12:NaN};let sum=v.ua*(c.ua||0)+v.history*(c.history||0)+v.math*(c.math||0)+v.fourthScore*k4+v.prep;let base=sum/den*(o.regionalCoef||1);let p12=base*(o.industryCoef||1);return{base,p12}}function resultScore(o){const s=calc(o);return (o.industryCoef||1)>1?s.p12:s.base}function state(o){if(o.threshold==null)return'unknown';const sc=resultScore(o);if(!Number.isFinite(sc)||sc<=0)return'unknown';return sc>=o.threshold?'ok':'no'}function diff(o){if(o.threshold==null)return null;return resultScore(o)-o.threshold}function rows(o){const v=vals(),c=o.coeffs||{},k4=c[v.fourth]??0;return [['ua',v.ua,c.ua],['history',v.history,c.history],['math',v.math,c.math],[v.fourth,v.fourthScore,k4],['prep',v.prep,null],['Регіональний коефіцієнт','—',o.regionalCoef||1],['Галузевий коефіцієнт','—',o.industryCoef||1],['K4max для формули Освіта.UA','—',c.k4max]].map(r=>`<tr><td>${LAB[r[0]]||r[0]}</td><td>${r[1]}</td><td>${r[2]==null?'-':'× '+Number(r[2]).toFixed(2)}</td></tr>`).join('')}function detail(o){const s=calc(o),ok=state(o)==='ok';return`<div class="detail"><div class="detailHead"><h3>${o.code} ${o.specialty}</h3><div style="font-size:24px;font-weight:900">Назва пропозиції:</div><div style="font-size:24px">${o.program}</div><div class="small">${o.form} · ID: ${o.id||'—'}</div><div class="score">${fmt(s.p12)} <span style="font-size:24px">(1–2 пріоритети${(o.industryCoef||1)>1?' ×1.02':''})</span></div><div class="score" style="font-size:42px">${fmt(s.base)} <span style="font-size:24px">(3–10 пріоритети)</span></div>${o.threshold!=null?`<div class="budget">${ok?'По бюджету проходиш':'По бюджету не вистачає'} · мін. бюджет: ${fmt(o.threshold)}</div>`:`<div class="warnTxt">Немає підтвердженого мін. бюджетного бала саме для цієї пропозиції. Я не підставляю чужий бал з іншої пропозиції.</div>`}<div class="small" style="margin-top:8px">${o.note||''}</div></div><table class="formula">${rows(o)}</table><div class="hint"><b>Формула як на Освіта.UA:</b> (сума НМТ × коефіцієнти + ОУ) / (K1+K2+K3+(K4+K4max)/2). Для 1–2 пріоритетів додається галузевий коефіцієнт, якщо він є.</div></div>`}function option(o){return`<div class="opt" data-id="${o.id}"><span class="code">${o.code}</span><div><b>${o.specialty}</b><div class="small">${o.program} · ${o.form} · ID: ${o.id}</div></div>${selected===o.id?'✓':''}</div>`}function renderOptions(){const q=($('specSearch').value||'').toLowerCase();let arr=DATA.offers.filter(o=>(`${o.code} ${o.specialty} ${o.program} ${o.form} ${o.id}`).toLowerCase().includes(q));$('opts').innerHTML=`<div class="opt ${selected==='all'?'active':''}" data-id="all"><span class="code">Усі</span><div><b>Показати всі пропозиції</b><div class="small">список усіх освітніх програм окремо</div></div>${selected==='all'?'✓':''}</div>`+arr.map(option).join('');document.querySelectorAll('.opt').forEach(x=>x.onclick=()=>{selected=x.dataset.id;$('drop').classList.remove('show');render()})}function renderSelect(){if(selected==='all')$('selectBtn').innerHTML='<span class="code">Усі</span><span>Показати всі пропозиції</span>';else{const o=DATA.offers.find(x=>x.id==selected);$('selectBtn').innerHTML=o?`<span class="code">${o.code}</span><span>${o.specialty}<br><small>${o.program} · ${o.form}</small></span>`:'<span class="code">Усі</span><span>Показати всі пропозиції</span>'}}function filtered(){let arr=DATA.offers.slice();if(selected!=='all')arr=arr.filter(o=>o.id==selected);const q=($('search').value||'').toLowerCase();if(q)arr=arr.filter(o=>(`${o.code} ${o.specialty} ${o.program} ${o.form} ${o.id}`).toLowerCase().includes(q));if(filter!=='all')arr=arr.filter(o=>state(o)===filter);return arr.sort((a,b)=>{const sa=state(a),sb=state(b);const r={ok:0,no:1,unknown:2};return (r[sa]-r[sb])||((diff(b)??-999)-(diff(a)??-999))})}function card(o){const s=calc(o),st=state(o),d=diff(o);return`<article class="card"><div><span class="code">${o.code}</span></div><div><div class="title">${o.specialty}</div><div class="small"><b>${o.program}</b> · ${o.form} · ID: ${o.id}<br>${o.faculty||''}</div><div class="meta"><span class="pill">3–10: ${fmt(s.base)}</span><span class="pill warn">1–2: ${fmt(s.p12)}</span>${o.threshold!=null?`<span class="pill green">мін. бюджет ${fmt(o.threshold)}</span>`:'<span class="pill red">без підтвердженого порогу</span>'}${o.budgetPlaces?`<span class="pill">бюдж. місць: ${o.budgetPlaces}</span>`:''}</div></div><div class="right"><div class="big ${st}">${st==='unknown'?'—':(d>=0?`+${fmt(d,2)}`:fmt(d,2))}</div><div class="${st}" style="font-weight:950">${st==='ok'?'проходиш':st==='no'?'не вистачає':'без порогу'}</div><div class="small"><a href="${o.url}" target="_blank">джерело</a></div></div></article>`}function render(){renderSelect();renderOptions();const chosen=DATA.offers.find(x=>x.id==selected);$('detail').innerHTML=selected==='all'?'':(chosen?detail(chosen):'');const arr=filtered();$('cards').innerHTML=arr.length?arr.map(card).join(''):'<div class="empty">Немає результатів.</div>';$('tbody').innerHTML=arr.map(o=>{const s=calc(o);return`<tr><td><span class="code">${o.code}</span></td><td>${o.specialty}</td><td><b>${o.program}</b><br><span class="small">${o.form} · ID: ${o.id}</span></td><td>${fmt(s.base)}</td><td>${fmt(s.p12)}</td><td>${o.threshold==null?'—':fmt(o.threshold)}</td></tr>`}).join('')}async function load(refresh=false){$('status').textContent='Завантаження…';try{const r=await fetch('/api/offers'+(refresh?'?refresh=1':''));DATA=await r.json();$('status').innerHTML=`${DATA.warning?'⚠️ ':''}${DATA.source}<br>Завантажено пропозицій: <b>${DATA.offers.length}</b>${DATA.warning?`<br>${DATA.warning}`:''}`;render()}catch(e){$('status').textContent='Помилка: '+e.message}}function init(){['ua','history','math','fourthScore','fourth','prep','search'].forEach(id=>$(id).addEventListener('input',render));$('calc').onclick=render;$('reset').onclick=()=>{['ua','history','math','fourthScore'].forEach(id=>$(id).value=0);$('prep').value=0;selected='all';render()};$('refresh').onclick=()=>load(true);$('selectBtn').onclick=()=>{$('drop').classList.toggle('show');$('specSearch').focus();renderOptions()};$('specSearch').oninput=renderOptions;document.addEventListener('click',e=>{if(!$('sel').contains(e.target))$('drop').classList.remove('show')});document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');filter=t.dataset.filter;render()});$('copy').onclick=()=>navigator.clipboard?.writeText(location.href);load(false)}init();
</script></body></html>
